<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Aesthet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-color: #F3F3F6;
      --card-bg:  #FFFFFF;
      --text-main:#000000;
      --text-sec: #8E8E93;
      --border:   #E5E5EA;
      --btn-bg:   #F2F2F7;
      --accent:   #000000;
      --font:     -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      width: 100%;
      max-width: 340px;
      padding: 36px 24px;
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .brand-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-main);
    }

    .upload-zone {
      width: 100%;
      background: var(--btn-bg);
      border: 2px dashed #D1D1D6;
      border-radius: 20px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .upload-zone:active { transform: scale(0.97); }

    .upload-icon {
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .upload-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-main);
    }

    .upload-subtext {
      font-size: 12px;
      color: var(--text-sec);
      margin-top: 6px;
    }

    /* ── Анимация сканера (Видоискатель) ────────────────────────── */
    .loader-container {
      width: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 16px 0;
    }
    .loader-container.visible { display: flex; }

    .viewfinder {
      position: relative;
      width: 56px;
      height: 56px;
      /* Эффект поиска фокуса (дыхание) */
      animation: vf-focus 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
    }

    @keyframes vf-focus {
      0% { transform: scale(1); }
      100% { transform: scale(0.85); }
    }

    /* 4 уголка прицела */
    .vf-corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--accent);
      border-style: solid;
    }
    .vf-tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-top-left-radius: 4px; }
    .vf-tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-top-right-radius: 4px; }
    .vf-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-bottom-left-radius: 4px; }
    .vf-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-bottom-right-radius: 4px; }

    /* Бегающий луч сканера */
    .vf-line {
      position: absolute;
      left: 5%;
      width: 90%;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.3);
      animation: vf-scan 1.2s linear infinite alternate;
    }

    @keyframes vf-scan {
      0% { top: 5%; opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { top: 95%; opacity: 0; }
    }

    .loading-status {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      text-align: center;
      min-height: 20px;
      animation: fadeInText 0.3s ease;
    }

    @keyframes fadeInText {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Результаты ──────────────────────────────────── */
    .result {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 20px;
      animation: fadeIn 0.4s ease forwards;
    }
    .result.visible { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .query-text {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-main);
      text-align: center;
      line-height: 1.4;
    }

    .markets {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .market-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 8px;
      background: #FFFFFF;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .market-btn:active {
      background: var(--btn-bg);
      border-color: #D1D1D6;
    }

    .reset-btn {
      margin-top: 8px;
      background: none;
      border: none;
      color: var(--text-sec);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 8px;
      transition: color 0.2s;
    }
    .reset-btn:active { color: var(--text-main); }

    .error-text {
      font-size: 13px;
      color: #FF3B30;
      text-align: center;
      display: none;
      font-weight: 500;
    }
    .error-text.visible { display: block; }

    #file-input { display: none; }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 8V5a1 1 0 0 1 1-1h3"/>
        <path d="M20 8V5a1 1 0 0 0-1-1h-3"/>
        <path d="M4 16v3a1 1 0 0 0 1 1h3"/>
        <path d="M20 16v3a1 1 0 0 1-1 1h-3"/>
        <path d="M12 9l1.25 1.75L15 12l-1.75 1.25L12 15l-1.25-1.75L9 12l1.75-1.25z" fill="#000000"/>
      </svg>
      <span class="brand-title">Aesthet</span>
    </div>

    <input type="file" id="file-input" accept="image/*" />

    <div class="upload-zone" id="upload-zone">
      <svg class="upload-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <div class="upload-text">Загрузить фото</div>
      <div class="upload-subtext">Поиск по маркетплейсам</div>
    </div>
    
    <p class="error-text" id="error-text"></p>

    <!-- Тот самый новый видоискатель -->
    <div class="loader-container" id="loader">
      <div class="viewfinder">
        <div class="vf-corner vf-tl"></div>
        <div class="vf-corner vf-tr"></div>
        <div class="vf-corner vf-bl"></div>
        <div class="vf-corner vf-br"></div>
        <div class="vf-line"></div>
      </div>
      <div class="loading-status" id="loading-status">Сканируем фото...</div>
    </div>

    <div class="result" id="result">
      <p class="query-text" id="query-text"></p>
      <div class="markets">
        <a class="market-btn" id="btn-wb"  href="#">Wildberries</a>
        <a class="market-btn" id="btn-oz"  href="#">Ozon</a>
        <a class="market-btn" id="btn-ali" href="#">AliExpress</a>
        <a class="market-btn" id="btn-ym"  href="#">Яндекс Маркет</a>
      </div>
      <button class="reset-btn" id="reset-btn">Искать другое фото</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      try {
        tg.setHeaderColor('#F3F3F6');
        tg.setBackgroundColor('#F3F3F6');
      } catch(e) {}
    }

    const fileInput  = document.getElementById('file-input');
    const uploadZone = document.getElementById('upload-zone');
    const loader     = document.getElementById('loader');
    const statusText = document.getElementById('loading-status');
    const result     = document.getElementById('result');
    const queryText  = document.getElementById('query-text');
    const btnWb      = document.getElementById('btn-wb');
    const btnOz      = document.getElementById('btn-oz');
    const btnAli     = document.getElementById('btn-ali');
    const btnYm      = document.getElementById('btn-ym');
    const resetBtn   = document.getElementById('reset-btn');
    const errorText  = document.getElementById('error-text');

    const statuses = [
      "Сканируем силуэт и детали...",
      "Распознаем материалы...",
      "Сверяемся с каталогами магазинов...",
      "Анализируем тренды...",
      "Формируем точные запросы...",
      "Почти готово..."
    ];
    let statusInterval;

    uploadZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      await analyze(file);
    });

    async function analyze(file) {
      errorText.classList.remove('visible');
      errorText.textContent = '';
      uploadZone.style.display = 'none';
      result.classList.remove('visible');
      
      loader.classList.add('visible');
      let statusIndex = 0;
      statusText.textContent = statuses[0];
      
      statusInterval = setInterval(() => {
        statusIndex++;
        if (statusIndex < statuses.length) {
          statusText.style.animation = 'none';
          statusText.offsetHeight; 
          statusText.style.animation = 'fadeInText 0.3s ease';
          statusText.textContent = statuses[statusIndex];
        }
      }, 1500);

      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/analyze', { method: 'POST', body: form });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Главное изменение: теперь на экран выводится красивое имя вещи (data.item_name)
        queryText.textContent = data.item_name;
        
        btnWb.href  = data.wb;
        btnOz.href  = data.oz;
        btnAli.href = data.ali;
        btnYm.href  = data.ym;

        [btnWb, btnOz, btnAli, btnYm].forEach(btn => {
          btn.onclick = e => {
            if (tg && tg.openLink) {
              e.preventDefault();
              tg.openLink(btn.href);
            }
          };
        });

        loader.classList.remove('visible');
        result.classList.add('visible');

      } catch (err) {
        loader.classList.remove('visible');
        uploadZone.style.display = 'flex';
        errorText.textContent = 'Не удалось распознать товар. Попробуйте ещё раз.';
        errorText.classList.add('visible');
      } finally {
        clearInterval(statusInterval);
        fileInput.value = '';
      }
    }

    resetBtn.addEventListener('click', () => {
      result.classList.remove('visible');
      errorText.classList.remove('visible');
      uploadZone.style.display = 'flex';
    });
  </script>
</body>
</html>
