<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Aesthet</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #000000;
      --fg:       #ffffff;
      --muted:    rgba(255,255,255,0.35);
      --border:   rgba(255,255,255,0.12);
      --btn-bg:   rgba(255,255,255,0.06);
      --btn-hover:rgba(255,255,255,0.11);
      --radius:   2px;
      --font:     -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 32px 24px;
      gap: 48px;
    }

    /* ── Wordmark ─────────────────────────────────────── */
    .wordmark {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* ── Upload zone ──────────────────────────────────── */
    .upload-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 320px;
    }

    .upload-btn {
      width: 100%;
      padding: 18px 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius);
      transition: background 0.18s, border-color 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .upload-btn:hover   { background: var(--btn-hover); border-color: rgba(255,255,255,0.28); }
    .upload-btn:active  { background: rgba(255,255,255,0.15); }
    .upload-btn:disabled { opacity: 0.3; cursor: default; }

    /* ── Loading bar ──────────────────────────────────── */
    .loader {
      width: 100%;
      max-width: 320px;
      height: 1px;
      background: var(--border);
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .loader.visible { opacity: 1; }
    .loader-bar {
      height: 100%;
      width: 0%;
      background: var(--fg);
      animation: none;
    }
    .loader.running .loader-bar {
      animation: sweep 1.4s cubic-bezier(0.4,0,0.2,1) infinite;
    }
    @keyframes sweep {
      0%   { width: 0%;   margin-left: 0%;   }
      50%  { width: 60%;  margin-left: 20%;  }
      100% { width: 0%;   margin-left: 100%; }
    }

    /* ── Result ───────────────────────────────────────── */
    .result {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.38s ease, transform 0.38s ease;
      pointer-events: none;
    }
    .result.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .query-text {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--fg);
    }

    /* ── Marketplace buttons ──────────────────────────── */
    .markets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .market-btn {
      display: block;
      padding: 13px 4px;
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      font-family: var(--font);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .market-btn:hover  { background: var(--btn-hover); border-color: rgba(255,255,255,0.25); }
    .market-btn:active { background: rgba(255,255,255,0.15); }

    /* ── Reset ────────────────────────────────────────── */
    .reset-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn:hover { color: var(--fg); }

    /* ── Error ────────────────────────────────────────── */
    .error-text {
      font-size: 12px;
      color: rgba(255,80,80,0.8);
      letter-spacing: 0.04em;
      display: none;
    }
    .error-text.visible { display: block; }

    #file-input { display: none; }
  </style>
</head>
<body>

  <span class="wordmark">Aesthet</span>

  <input type="file" id="file-input" accept="image/*" />

  <div class="upload-zone" id="upload-zone">
    <button class="upload-btn" id="upload-btn">Загрузить фото</button>
    <p class="error-text" id="error-text"></p>
  </div>

  <div class="loader" id="loader">
    <div class="loader-bar"></div>
  </div>

  <div class="result" id="result">
    <p class="query-text" id="query-text"></p>
    <div class="markets">
      <a class="market-btn" id="btn-wb"  href="#" target="_blank">Wildberries</a>
      <a class="market-btn" id="btn-oz"  href="#" target="_blank">Ozon</a>
      <a class="market-btn" id="btn-ali" href="#" target="_blank">AliExpress</a>
    </div>
    <button class="reset-btn" id="reset-btn">Новый поиск</button>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor('#000000');
      tg.setBackgroundColor('#000000');
    }

    const fileInput  = document.getElementById('file-input');
    const uploadBtn  = document.getElementById('upload-btn');
    const uploadZone = document.getElementById('upload-zone');
    const loader     = document.getElementById('loader');
    const result     = document.getElementById('result');
    const queryText  = document.getElementById('query-text');
    const btnWb      = document.getElementById('btn-wb');
    const btnOz      = document.getElementById('btn-oz');
    const btnAli     = document.getElementById('btn-ali');
    const resetBtn   = document.getElementById('reset-btn');
    const errorText  = document.getElementById('error-text');

    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      await analyze(file);
    });

    async function analyze(file) {
      // Reset error
      errorText.classList.remove('visible');
      errorText.textContent = '';

      // Show loader, hide result, disable button
      uploadBtn.disabled = true;
      result.classList.remove('visible');
      loader.classList.add('visible', 'running');

      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/analyze', { method: 'POST', body: form });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        queryText.textContent = data.query;
        btnWb.href  = data.wb;
        btnOz.href  = data.oz;
        btnAli.href = data.ali;

        // Open links via Telegram SDK when available
        [btnWb, btnOz, btnAli].forEach(btn => {
          btn.onclick = e => {
            if (tg) {
              e.preventDefault();
              tg.openLink(btn.href);
            }
          };
        });

        loader.classList.remove('running');
        setTimeout(() => {
          loader.classList.remove('visible');
          result.classList.add('visible');
        }, 200);

      } catch (err) {
        loader.classList.remove('visible', 'running');
        errorText.textContent = 'Не удалось распознать товар. Попробуйте ещё раз.';
        errorText.classList.add('visible');
      } finally {
        uploadBtn.disabled = false;
        fileInput.value = '';
      }
    }

    resetBtn.addEventListener('click', () => {
      result.classList.remove('visible');
      errorText.classList.remove('visible');
    });
  </script>
</body>
</html>
